name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: python3 -m unittest discover -s test -p 'test_*.py'

  release:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write   # required to create releases and upload assets

    steps:
      - uses: actions/checkout@v4

      - name: Verify versions match tag
        run: |
          tag="${GITHUB_REF_NAME#v}"
          py_version="$(python3 -c 'from styx import __version__; print(__version__)')"
          sh_version="$(grep -m1 '^VERSION=' scripts/install.sh | cut -d'"' -f2)"
          ok=true
          if [ "$tag" != "$py_version" ]; then
            echo "::error::Tag v${tag} does not match styx.__version__ '${py_version}'"
            ok=false
          fi
          if [ "$tag" != "$sh_version" ]; then
            echo "::error::Tag v${tag} does not match install.sh VERSION '${sh_version}'"
            ok=false
          fi
          $ok

      - name: Build styx.pyz
        run: bash scripts/build.sh styx.pyz

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            styx.pyz
            scripts/install.sh
          generate_release_notes: true
