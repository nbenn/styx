name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: python3 -m unittest discover -s test -p 'test_*.py'

  release:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write   # required to create releases and upload assets

    steps:
      - uses: actions/checkout@v4

      - name: Verify version matches tag
        run: |
          tag="${GITHUB_REF_NAME#v}"
          internal="$(python3 -c 'from styx import __version__; print(__version__)')"
          if [ "$tag" != "$internal" ]; then
            echo "::error::Tag v${tag} does not match __version__ '${internal}'"
            exit 1
          fi

      - name: Build styx.pyz
        run: bash scripts/build.sh styx.pyz

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            styx.pyz
            scripts/install.sh
          generate_release_notes: true
